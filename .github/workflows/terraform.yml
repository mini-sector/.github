# Reusable workflow to fmt/validate/plan (and optionally apply) Terraform
# against Azure via OIDC. Called from mini-sector/<repo>/.github/workflows/*.yml
# via `uses: mini-sector/.github/.github/workflows/terraform.yml@main`.
name: terraform

on:
  workflow_call:
    inputs:
      workspace:
        description: Terraform workspace, e.g. dev or prod
        type: string
        required: true
      working-directory:
        description: Directory containing the Terraform configuration
        type: string
        default: "."
      apply:
        description: Apply the plan after it succeeds; otherwise stop after plan
        type: boolean
        default: false
    secrets:
      azure-client-id:
        required: true
      azure-tenant-id:
        required: true
      azure-subscription-id:
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.azure-client-id }}
      ARM_TENANT_ID: ${{ secrets.azure-tenant-id }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.azure-subscription-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: mini-sector/.github/actions/azure-login@main
        with:
          client-id: ${{ secrets.azure-client-id }}
          tenant-id: ${{ secrets.azure-tenant-id }}
          subscription-id: ${{ secrets.azure-subscription-id }}

      - name: Set up Terraform
        uses: mini-sector/.github/actions/setup-terraform@main
        with:
          workspace: ${{ inputs.workspace }}
          working-directory: ${{ inputs.working-directory }}

      - name: Terraform fmt
        working-directory: ${{ inputs.working-directory }}
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: ${{ inputs.working-directory }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ inputs.working-directory }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: ${{ inputs.apply }}
        working-directory: ${{ inputs.working-directory }}
        run: terraform apply -input=false tfplan
