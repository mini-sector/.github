# Reusable workflow to build/push a service image and bump its tag in the
# gitops repo. Does NOT deploy or touch a cluster - Argo CD reconciles the
# gitops repo after this workflow commits to it. Called from
# mini-sector/<repo>/.github/workflows/*.yml via
# `uses: mini-sector/.github/.github/workflows/docker-build.yml@main`.
name: docker-build

on:
  workflow_call:
    inputs:
      service:
        description: Crate/service name; also used as the image name
        type: string
        required: true
      dockerfile:
        description: Path to the Dockerfile
        type: string
        default: Dockerfile
      context:
        description: Docker build context
        type: string
        default: "."
      registry:
        description: Container registry to push to
        type: string
        default: ghcr.io
      gitops-repo:
        description: Repo containing the Kustomize overlays, e.g. mini-sector/gitops
        type: string
        required: true
      gitops-path:
        description: Directory containing the Kustomize overlay to update
        type: string
        required: true
      build-args:
        type: string
        default: ""
        description: Newline-separated KEY=value pairs passed to docker build
    secrets:
      gitops-token:
        description: PAT or GitHub App token with write access to the gitops repo
        required: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      sha-tag: ${{ steps.tags.outputs.sha-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: ${{ inputs.registry == 'ghcr.io' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: echo "sha-tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ inputs.registry }}/mini-sector/${{ inputs.service }}:${{ steps.tags.outputs.sha-tag }}
            ${{ inputs.registry }}/mini-sector/${{ inputs.service }}:latest
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    needs: build-push
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: gitops-update-${{ inputs.gitops-repo }}
      cancel-in-progress: false
    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.gitops-repo }}
          token: ${{ secrets.gitops-token }}
          path: gitops-checkout

      - name: Check overlay exists
        id: overlay
        shell: bash
        run: |
          if [[ -f "gitops-checkout/${{ inputs.gitops-path }}/kustomization.yaml" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::no gitops app for '${{ inputs.service }}' at '${{ inputs.gitops-path }}' — image published, promotion skipped"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install kustomize
        if: steps.overlay.outputs.exists == 'true'
        uses: imranismail/setup-kustomize@v2

      - name: Set image tag
        if: steps.overlay.outputs.exists == 'true'
        working-directory: gitops-checkout/${{ inputs.gitops-path }}
        run: kustomize edit set image ${{ inputs.service }}=${{ inputs.registry }}/mini-sector/${{ inputs.service }}:${{ needs.build-push.outputs.sha-tag }}

      - name: Commit and push
        if: steps.overlay.outputs.exists == 'true'
        working-directory: gitops-checkout
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHORT_SHA="${{ needs.build-push.outputs.sha-tag }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          git add "${{ inputs.gitops-path }}"
          if git diff --cached --quiet; then
            echo "::notice::no changes to commit for '${{ inputs.service }}'"
          else
            git commit -m "chore: bump ${{ inputs.service }} to ${SHORT_SHA}"
            git push
          fi
