# Installs a Rust toolchain and configures Swatinem/rust-cache.
# Called by reusable workflows and any repo-local Rust CI job.
name: setup-rust
description: Install a Rust toolchain and enable dependency/build caching.

inputs:
  toolchain:
    description: Rust toolchain to install (e.g. stable, nightly, 1.79.0)
    required: false
    default: stable
  components:
    description: Comma-separated rustup components to install
    required: false
    default: "rustfmt, clippy"
  cache-key:
    description: Extra segment to add to the rust-cache key
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Cache cargo artifacts
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ inputs.cache-key }}
